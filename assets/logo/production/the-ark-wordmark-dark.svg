<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="green-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- For use on dark backgrounds -->
  <text x="300" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="72" fill="#f5f5f7" letter-spacing="-1">The Ark <tspan fill="url(#green-cyan)">AI</tspan></text>
  <text x="300" y="105" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="16" fill="#94a3b8" letter-spacing="6">AI FOR WHERE IT MATTERS MOST</text>
</svg>
