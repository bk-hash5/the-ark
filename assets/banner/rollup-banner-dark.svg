<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 2000" width="850" height="2000">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0221"/>
      <stop offset="50%" style="stop-color:#150734"/>
      <stop offset="100%" style="stop-color:#0A0A2E"/>
    </linearGradient>
    <linearGradient id="lightning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE44D"/>
      <stop offset="50%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF2D2D"/>
    </linearGradient>
    <linearGradient id="ark-hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="50%" style="stop-color:#3F51B5"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="ark-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#304FFE"/>
    </linearGradient>
    <linearGradient id="water1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#18FFFF;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00B0FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="water2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BFA5;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#64FFDA;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00BFA5;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="25%" style="stop-color:#FFD93D"/>
      <stop offset="50%" style="stop-color:#6BCB77"/>
      <stop offset="75%" style="stop-color:#4D96FF"/>
      <stop offset="100%" style="stop-color:#9B59B6"/>
    </linearGradient>
    <linearGradient id="green-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00E5FF" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="spark">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="2000" fill="url(#bg-grad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="85" y1="0" x2="85" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="170" y1="0" x2="170" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="255" y1="0" x2="255" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="340" y1="0" x2="340" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="425" y1="0" x2="425" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="510" y1="0" x2="510" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="595" y1="0" x2="595" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="680" y1="0" x2="680" y2="2000" stroke="#fff" stroke-width="0.5"/>
    <line x1="765" y1="0" x2="765" y2="2000" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Ambient particles/stars -->
  <circle cx="120" cy="150" r="2" fill="#FFE44D" opacity="0.6"/>
  <circle cx="700" cy="200" r="1.5" fill="#FF6B6B" opacity="0.4"/>
  <circle cx="80" cy="400" r="1.8" fill="#00E5FF" opacity="0.5"/>
  <circle cx="750" cy="500" r="1.2" fill="#64FFDA" opacity="0.3"/>
  <circle cx="200" cy="650" r="1" fill="#9B59B6" opacity="0.4"/>
  <circle cx="650" cy="750" r="1.5" fill="#FFD93D" opacity="0.5"/>
  <circle cx="100" cy="900" r="2" fill="#6BCB77" opacity="0.3"/>
  <circle cx="780" cy="1100" r="1.5" fill="#FF6B6B" opacity="0.4"/>
  <circle cx="150" cy="1300" r="1" fill="#00E5FF" opacity="0.5"/>
  <circle cx="720" cy="1500" r="1.8" fill="#FFE44D" opacity="0.3"/>

  <!-- ============== TOP SECTION: LOGO ============== -->
  
  <!-- Logo container - The Ark logo scaled up -->
  <g transform="translate(425, 280) scale(0.7)">
    <!-- Background circle -->
    <circle cx="0" cy="0" r="256" fill="url(#bg-grad)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="245" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.7"/>
    <!-- Stars -->
    <circle cx="-156" cy="-136" r="1.5" fill="#FFE44D" opacity="0.8"/>
    <circle cx="144" cy="-156" r="1" fill="#FF6B6B" opacity="0.6"/>
    <circle cx="-176" cy="-56" r="1" fill="#00E5FF" opacity="0.7"/>
    <circle cx="174" cy="-76" r="1.5" fill="#64FFDA" opacity="0.5"/>
    <!-- Lightning glow -->
    <polygon points="0,-176 -24,-71 8,-78 -16,14 44,-91 12,-84 32,-166" fill="#FFD700" opacity="0.15" filter="url(#glow-purple)"/>
    <!-- Ark hull -->
    <path d="M -141 69 Q -116 134 0 134 Q 116 134 141 69 L 119 69 Q 104 114 0 114 Q -104 114 -119 69 Z" fill="url(#ark-hull)" stroke="#B388FF" stroke-width="1"/>
    <!-- Ark body -->
    <path d="M -101 69 L -84 -1 L 84 -1 L 101 69 Z" fill="url(#ark-body)" stroke="#B388FF" stroke-width="0.8"/>
    <!-- Deck lines -->
    <line x1="-89" y1="34" x2="89" y2="34" stroke="#E040FB" stroke-width="0.8" opacity="0.6"/>
    <!-- Windows -->
    <circle cx="-46" cy="19" r="6" fill="#18FFFF" opacity="0.7"/>
    <circle cx="0" cy="19" r="6" fill="#FFE44D" opacity="0.7"/>
    <circle cx="46" cy="19" r="6" fill="#FF6B6B" opacity="0.7"/>
    <!-- Lightning bolt -->
    <polygon points="0,-176 -24,-71 8,-78 -16,14 44,-91 12,-84 32,-166" fill="url(#lightning)" filter="url(#glow-gold)"/>
    <!-- Sparks -->
    <circle cx="-14" cy="16" r="4" fill="#FFE44D" opacity="0.8" filter="url(#spark)"/>
    <circle cx="-1" cy="22" r="3" fill="#FF6B00" opacity="0.6" filter="url(#spark)"/>
    <!-- Water -->
    <path d="M -186 122 Q -146 104 -101 122 Q -56 140 -11 122 Q 34 104 79 122 Q 124 140 169 122 Q 204 109 224 122" fill="none" stroke="url(#water1)" stroke-width="3" filter="url(#glow-cyan)"/>
    <path d="M -196 139 Q -151 124 -106 139 Q -61 154 -16 139 Q 29 124 74 139 Q 119 154 164 139 Q 199 127 219 139" fill="none" stroke="url(#water2)" stroke-width="2.5" opacity="0.7"/>
    <!-- THE ARK text -->
    <text x="0" y="192" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38" fill="url(#ring)" letter-spacing="10">THE ARK</text>
    <!-- Tagline -->
    <text x="0" y="217" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="13" fill="#18FFFF" letter-spacing="5" opacity="0.8">AI × LIGHTNING</text>
  </g>

  <!-- ============== BRAND NAME ============== -->
  <text x="425" y="540" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="72" fill="#f5f5f7" letter-spacing="-1">The Ark <tspan fill="url(#green-cyan)">AI</tspan></text>

  <!-- Divider line -->
  <rect x="325" y="570" width="200" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- ============== MAIN SLOGAN ============== -->
  <text x="425" y="670" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="52" fill="#e2e8f0" letter-spacing="-0.5">
    <tspan x="425" dy="0">AI for Where</tspan>
    <tspan x="425" dy="68">It Matters Most.</tspan>
  </text>

  <!-- ============== SECONDARY LINE ============== -->
  <text x="425" y="850" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="28" fill="#94a3b8" letter-spacing="1">
    No signup. No subscription.
  </text>
  <text x="425" y="895" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="30" fill="#FFE44D" letter-spacing="1">
    Pay with Lightning ⚡
  </text>

  <!-- Divider -->
  <rect x="250" y="950" width="350" height="1" rx="0.5" fill="url(#accent-line)"/>

  <!-- ============== FEATURES SECTION ============== -->
  
  <!-- Feature 1 -->
  <g transform="translate(130, 1030)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-size="22" fill="#22c55e">🧠</text>
    <text x="50" y="-6" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="24" fill="#f5f5f7">120+ AI Services</text>
    <text x="50" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="17" fill="#94a3b8">Research, code, translate, create</text>
  </g>

  <!-- Feature 2 -->
  <g transform="translate(130, 1120)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-size="22" fill="#06b6d4">⚡</text>
    <text x="50" y="-6" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="24" fill="#f5f5f7">Bitcoin Lightning</text>
    <text x="50" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="17" fill="#94a3b8">Instant payments from 50 sats</text>
  </g>

  <!-- Feature 3 -->
  <g transform="translate(130, 1210)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-size="22" fill="#a855f7">🔒</text>
    <text x="50" y="-6" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="24" fill="#f5f5f7">Zero Data Collection</text>
    <text x="50" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="17" fill="#94a3b8">No accounts, no tracking, no emails</text>
  </g>

  <!-- Feature 4 -->
  <g transform="translate(130, 1300)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#FFE44D" stroke-width="2" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-size="22" fill="#FFE44D">🌍</text>
    <text x="50" y="-6" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="24" fill="#f5f5f7">Built for Africa</text>
    <text x="50" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="17" fill="#94a3b8">Accessible AI for the next billion</text>
  </g>

  <!-- Divider -->
  <rect x="250" y="1400" width="350" height="1" rx="0.5" fill="url(#accent-line)"/>

  <!-- ============== QR CODE PLACEHOLDER ============== -->
  <rect x="325" y="1450" width="200" height="200" rx="16" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="425" y="1560" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="20" fill="#94a3b8">QR CODE</text>
  <text x="425" y="1585" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="14" fill="#64748b">Scan to try</text>

  <text x="425" y="1700" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="26" fill="#06b6d4" letter-spacing="1">arknode.ai</text>

  <!-- ============== BOTTOM SECTION ============== -->
  
  <!-- Bottom accent bar -->
  <rect x="0" y="1850" width="850" height="150" fill="#0a0a12"/>
  <rect x="0" y="1848" width="850" height="2" fill="url(#ring)" opacity="0.5"/>
  
  <!-- Bottom text -->
  <text x="425" y="1910" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="18" fill="#64748b" letter-spacing="3">POWERED BY</text>
  <text x="425" y="1950" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="24" fill="#FFE44D" letter-spacing="2">BITCOIN LIGHTNING NETWORK ⚡</text>
</svg>
